name = "tensou"
product-name = "Tensou"
identifier = "com.tensou.app"
version = "0.1.0"
authors = ["kofta999"]
publisher = "kofta999"
description = "A fast and secure file transfer tool built with QUIC and Slint."
homepage = "https://github.com/kofta999/tensou"

out-dir = "./dist"
before-packaging-command = "cargo build --release"
binaries-dir = "target/release"

binaries = [
  { name = "tensou", path = "tensou" }
]

# Icons to use for packaging
icons = ["assets/icon.png"]

# Target package formats to generate by default
formats = ["appimage"]
